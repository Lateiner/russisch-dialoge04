<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Quiz: In der Kabine (10 Fragen)</title>
    <style>
        :root {
            --primary-blue: #0055a4;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --success: #28a745;
            --error: #dc3545;
            --text-dark: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            overflow: hidden;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary-blue);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 5px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.4;
            min-height: 3em;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-blue);
            background-color: #f8fbff;
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error) !important;
            color: #721c24;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .btn-next {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: background 0.2s;
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .result-score {
            font-size: 3.5rem;
            color: var(--primary-blue);
            margin: 20px 0;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .quiz-container { padding: 20px; }
            .question-text { font-size: 1.1rem; }
            .option-btn { padding: 14px; font-size: 1rem; }
            .btn-next { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-ui">
            <div class="progress-header">
                <span id="question-num">Frage 1 von 10</span>
                <span id="score-display">Punkte: 0</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>

            <div class="question-text" id="question">Lade...</div>
            
            <div class="options-list" id="options"></div>

            <div class="controls">
                <button class="btn-next" id="next-btn" onclick="nextQuestion()">Nächste Frage</button>
            </div>
        </div>

        <div id="result-ui" class="result-screen">
            <h2>Übung abgeschlossen!</h2>
            <div class="result-score" id="final-score">0 / 10</div>
            <p id="result-text"></p>
            <button class="btn-next" style="display:inline-block; margin-top: 20px;" onclick="location.reload()">Neustart</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "Wo befindet sich laut Bordkarte der Platz 21Б?",
                options: ["у окна", "посередине", "у прохода"],
                correct: 1
            },
            {
                q: "Wo soll man laut Stewardess die Tasche verstauen?",
                options: ["на багажную полку", "в туалет", "на соседнее кресло"],
                correct: 0
            },
            {
                q: "Was gehört laut Video zur Kategorie 'верхняя одежда'?",
                options: ["сумки и чемоданы", "куртки и пальто", "наушники и телефоны"],
                correct: 1
            },
            {
                q: "Was muss mit dem Tisch (столик) vor dem Start passieren?",
                options: ["опустить столик", "поднять столик", "положить на полку"],
                correct: 1
            },
            {
                q: "Was soll man mit den Armlehnen (подлокотники) machen?",
                options: ["поднять", "опустить", "снять"],
                correct: 1
            },
            {
                q: "Welche Einstellung wird für das Telefon verlangt?",
                options: ["авиарежим", "беззвучный режим", "ночной режим"],
                correct: 0
            },
            {
                q: "Welches Signal schaltet der Kapitän ein, damit alle sitzen bleiben?",
                options: ["Нельзя курить", "Пристегните ремни", "Тишина"],
                correct: 1
            },
            {
                q: "Wie möchte der Passagier seinen Kaffee trinken?",
                options: ["с молоком", "с лимоном", "без сахара"],
                correct: 2
            },
            {
                q: "Welche zwei Hauptgerichte stehen meist zur Auswahl?",
                options: ["пицца или паста", "курица или рыба", "суп или салат"],
                correct: 1
            },
            {
                q: "Wann darf man nach der Landung abschnallen und aufstehen?",
                options: ["когда самолёт коснулся земли", "после полной остановки самолёта", "когда захочется"],
                correct: 2
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            document.getElementById('next-btn').style.display = 'none';
            
            const data = quizData[currentIdx];
            document.getElementById('question').innerText = data.q;
            document.getElementById('question-num').innerText = `Frage ${currentIdx + 1} von ${quizData.length}`;
            
            const progress = (currentIdx / quizData.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, clickedBtn) {
            if (answered) return;
            answered = true;

            const correctIndex = quizData[currentIdx].correct;
            const allBtns = document.querySelectorAll('.option-btn');

            if (selectedIndex === correctIndex) {
                clickedBtn.classList.add('correct');
                score++;
                document.getElementById('score-display').innerText = `Punkte: ${score}`;
            } else {
                clickedBtn.classList.add('wrong');
                allBtns[correctIndex].classList.add('correct');
            }

            allBtns.forEach(btn => btn.disabled = true);
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-ui').style.display = 'none';
            const resultUI = document.getElementById('result-ui');
            resultUI.style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
            
            let msg = "";
            if (score === 10) msg = "Вы молодец! (Hervorragend!)";
            else if (score >= 7) msg = "Хорошо! (Gut gemacht!)";
            else msg = "Попробуйте еще раз! (Versuch es noch einmal!)";
            document.getElementById('result-text').innerText = msg;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
