<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Richtig oder Falsch?</title>
    <style>
        :root {
            --primary-blue: #0055a4;
            --bg-color: #f4f7f6;
            --success: #28a745;
            --error: #dc3545;
            --white: #ffffff;
            --text: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-card {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary-blue);
            width: 0%;
            transition: width 0.4s ease;
        }

        .statement-box {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: white;
        }

        .btn-true { background-color: var(--success); }
        .btn-false { background-color: var(--error); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #feedback {
            min-height: 80px;
            margin-top: 20px;
            font-size: 1rem;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .feedback-correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .feedback-wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .btn-next {
            margin-top: 20px;
            background-color: var(--primary-blue);
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .btn-group { grid-template-columns: 1fr; }
            .statement-box { font-size: 1.1rem; }
            .game-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="game-card">
    <h1>Верно или нет?</h1>
    <p>Ist diese Aussage richtig oder falsch?</p>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div class="statement-box" id="statement">Lade Aussage...</div>

    <div class="btn-group" id="btn-group">
        <button class="btn btn-true" onclick="checkAnswer(true)">Правда (Wahr)</button>
        <button class="btn btn-false" onclick="checkAnswer(false)">Ложь (Falsch)</button>
    </div>

    <div id="feedback"></div>
    <button class="btn-next" id="next-btn" onclick="nextQuestion()">Nächste Frage</button>
</div>

<script>
    const questions = [
        {
            text: "Место 21Б — это место посередине.",
            correct: true,
            explanation: "Richtig. In der russischen Sitzordnung steht 'Б' im Mittelgang meist für den Mittelplatz (посередине)."
        },
        {
            text: "Можно вставать, когда самолёт только коснулся земли.",
            correct: false,
            explanation: "Falsch. Man muss sitzen bleiben, bis das Flugzeug vollständig steht (до полной остановки)."
        },
        {
            text: "Верхняя одежда — это куртки и пальто.",
            correct: true,
            explanation: "Richtig. 'Верхняя одежда' bezeichnet die Kleidung, die man draußen drüberzieht."
        },
        {
            text: "Сумку можно положить в проходе между креслами.",
            correct: false,
            explanation: "Falsch. Gänge müssen frei bleiben. Taschen gehören ins Gepäckfach oder unter den Vordersitz."
        },
        {
            text: "Перед взлётом нужно поднять столик.",
            correct: true,
            explanation: "Richtig. Der Klapptisch muss aus Sicherheitsgründen beim Start hochgeklappt sein."
        },
        {
            text: "Бортпроводник часто спрашивает: «Курица или рыба?»",
            correct: true,
            explanation: "Richtig. Das ist die klassische Frage nach dem Hauptgericht im Flugzeug."
        },
        {
            text: "Телефоны нужно перевести в авиарежим.",
            correct: true,
            explanation: "Richtig. Elektronische Geräte müssen in den Flugmodus versetzt werden."
        },
        {
            text: "Шторку иллюминатора нужно закрыть при посадке.",
            correct: false,
            explanation: "Falsch. Die Fensterblenden müssen bei Start und Landung geöffnet (открыть) sein."
        },
        {
            text: "Капитан включает сигнал «Пристегните ремни».",
            correct: true,
            explanation: "Richtig. Der Kapitän steuert die Sicherheitsanzeigen in der Kabine."
        },
        {
            text: "Можно курить в туалете самолёта.",
            correct: false,
            explanation: "Falsch. Rauchen ist im gesamten Flugzeug streng verboten."
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('statement').innerText = q.text;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress-fill').style.width = (currentIdx / questions.length) * 100 + "%";
        
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(b => b.disabled = false);
    }

    function checkAnswer(userChoice) {
        const q = questions[currentIdx];
        const feedbackDiv = document.getElementById('feedback');
        const buttons = document.querySelectorAll('.btn');
        
        buttons.forEach(b => b.disabled = true);
        feedbackDiv.style.display = 'block';

        if (userChoice === q.correct) {
            score++;
            feedbackDiv.className = 'feedback-correct';
            feedbackDiv.innerHTML = "<strong>Правильно! ✅</strong><br>" + q.explanation;
        } else {
            feedbackDiv.className = 'feedback-wrong';
            feedbackDiv.innerHTML = "<strong>Неправильно! ❌</strong><br>" + q.explanation;
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        const card = document.querySelector('.game-card');
        let message = score > 7 ? "Отлично! (Ausgezeichnet!)" : "Хорошо! (Gut gemacht!)";
        card.innerHTML = `
            <h1>Ergebnis</h1>
            <div class="statement-box">${message}<br>Du hast ${score} von ${questions.length} Punkten erreicht.</div>
            <button class="btn-next" style="display:block; margin: 0 auto;" onclick="location.reload()">Neustart</button>
        `;
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
